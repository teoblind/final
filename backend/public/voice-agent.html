<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Coppice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#ffffff !important;color-scheme:light only;width:100%;height:100%;overflow:hidden}
body{color:#1e3a5f;font-family:-apple-system,system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
#white-bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.container{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;position:relative;z-index:1}
.avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid rgba(30,58,95,0.15)}
.logo{font-size:16px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#1e3a5f;opacity:0.7}
.status{font-size:11px;color:#1e3a5f;opacity:0.4;letter-spacing:1px}
</style>
</head>
<body>
<!-- Canvas draws white pixels - immune to Chrome forced dark mode -->
<canvas id="white-bg"></canvas>
<div class="container">
  <img class="avatar" src="/assets/coppice-bot-avatar.jpg" onerror="this.style.display='none'" />
  <div class="logo">coppice</div>
  <div class="status">listening</div>
</div>
<script>
// ============================================================
// Coppice Voice Agent v3 - Transcript-driven (no tab audio)
//
// Audio INPUT:  Recall transcript webhooks -> backend wake word -> relay /inject-text
// Audio OUTPUT: Relay -> OpenAI Realtime -> output_audio API -> Recall -> meeting
//
// This page: white visual display + WebSocket trigger for relay <-> OpenAI
// NO mic capture, NO audio playback (prevents "always unmuted" issue)
// ============================================================

// Force white background via canvas (Chrome forced dark mode can invert CSS but not canvas pixels)
(function() {
  const c = document.getElementById('white-bg');
  c.width = screen.width || 1920;
  c.height = screen.height || 1080;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, c.width, c.height);
})();

const DEFAULT_INSTRUCTIONS = `You are Coppice, an AI meeting assistant. Be professional, concise, and helpful. Keep responses brief. No emojis or filler phrases.`;

async function getSessionData() {
  const params = new URLSearchParams(location.search);
  const sid = params.get('sid');
  const tenantId = params.get('tenant') || 'default';

  if (sid) {
    const sessionUrl = `https://coppice.ai/api/v1/voice-session/${sid}`;
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        if (attempt > 0) {
          console.log(`[Coppice] Retry #${attempt} for botId...`);
          await new Promise(r => setTimeout(r, 2000));
        }
        console.log(`[Coppice] Fetching session data: ${sid}`);
        const res = await fetch(sessionUrl, { signal: AbortSignal.timeout(8000) });
        const data = await res.json();
        if (data.instructions && data.instructions.length > 100) {
          if (data.botId || attempt >= 3) {
            console.log(`[Coppice] Session loaded: ${data.instructions.length} chars, botId=${data.botId || 'none'}`);
            return { instructions: data.instructions, botId: data.botId || null };
          }
          console.log(`[Coppice] Got instructions but no botId yet, retrying...`);
        }
      } catch (e) {
        console.warn(`[Coppice] Session fetch failed:`, e.message);
      }
    }
  }

  const urls = [
    `https://coppice.ai/api/v1/voice-context/${tenantId}`,
    `${location.origin}/api/v1/voice-context/${tenantId}`,
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
      const data = await res.json();
      if (data.instructions && data.instructions.length > 100) {
        console.log(`[Coppice] Tenant instructions: ${data.instructions.length} chars`);
        return { instructions: data.instructions, botId: null };
      }
    } catch (e) {
      console.warn(`[Coppice] Tenant fetch failed:`, e.message);
    }
  }

  console.error('[Coppice] All instruction sources failed - using default');
  return { instructions: DEFAULT_INSTRUCTIONS, botId: null };
}

(async function main() {
  const params = new URLSearchParams(location.search);
  const wssUrl = params.get('wss');
  if (!wssUrl) {
    console.error('[Coppice] Missing ?wss= parameter');
    document.querySelector('.status').textContent = 'error: no relay';
    return;
  }
  console.log('[Coppice] Relay URL:', wssUrl);

  const sessionData = await getSessionData();
  const INSTRUCTIONS = sessionData.instructions;
  const SESSION_BOT_ID = sessionData.botId;

  const sid = params.get('sid');
  const relayUrlWithSid = sid ? `${wssUrl}${wssUrl.includes('?') ? '&' : '?'}sid=${sid}` : wssUrl;
  const ws = new WebSocket(relayUrlWithSid);

  ws.onopen = () => {
    console.log('[Coppice] Connected to relay');
    document.querySelector('.status').textContent = 'listening';

    // Send bot ID so relay can deliver audio via output_audio API
    if (SESSION_BOT_ID) {
      ws.send(JSON.stringify({ type: 'coppice.set_bot_id', bot_id: SESSION_BOT_ID }));
      console.log('[Coppice] Bot ID sent:', SESSION_BOT_ID);
    }

    // Configure OpenAI session - manual mode, no turn detection
    // Audio input comes via /inject-text (transcript webhooks), not mic
    ws.send(JSON.stringify({
      type: 'session.update',
      session: {
        modalities: ['text', 'audio'],
        instructions: INSTRUCTIONS,
        voice: 'alloy',
        input_audio_format: 'pcm16',
        output_audio_format: 'pcm16',
        turn_detection: null,
      },
    }));

    console.log('[Coppice] Transcript-driven mode configured');
  };

  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }

    switch (msg.type) {
      case 'session.created':
        console.log('[Coppice] OpenAI session created');
        break;
      case 'session.updated':
        console.log('[Coppice] Session config confirmed');
        document.querySelector('.status').textContent = 'listening';
        break;
      case 'response.created':
        document.querySelector('.status').textContent = 'speaking...';
        break;
      case 'response.audio_transcript.done':
        console.log('[Coppice] Said:', msg.transcript);
        break;
      case 'response.done':
        console.log('[Coppice] Response complete');
        document.querySelector('.status').textContent = 'listening';
        break;
      case 'error':
        console.error('[Coppice] Error:', JSON.stringify(msg.error));
        document.querySelector('.status').textContent = 'error';
        break;
      // All other events (response.audio.delta etc) silently ignored
      // Audio delivery is handled by relay -> output_audio API
    }
  };

  ws.onerror = (e) => {
    console.error('[Coppice] WS error:', e);
    document.querySelector('.status').textContent = 'error';
  };

  ws.onclose = (e) => {
    console.log('[Coppice] WS closed:', e.code, e.reason);
    document.querySelector('.status').textContent = 'disconnected';
  };
})();
</script>
</body>
</html>
