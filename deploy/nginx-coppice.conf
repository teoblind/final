# Coppice.ai — Nginx Configuration
# Deploy to: /etc/nginx/sites-available/coppice
# Enable:    ln -s /etc/nginx/sites-available/coppice /etc/nginx/sites-enabled/

# ─── Landing Page: coppice.ai + www.coppice.ai ──────────────────────────────
server {
    listen 80;
    server_name coppice.ai www.coppice.ai;

    # Redirect www to bare domain
    if ($host = www.coppice.ai) {
        return 301 https://coppice.ai$request_uri;
    }

    # Static landing page
    root /var/www/coppice-landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API routes proxy to backend (for demo request form)
    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── App: *.coppice.ai (all subdomains) ─────────────────────────────────────
server {
    listen 80;
    server_name *.coppice.ai;

    # Frontend (served by Node.js backend from dist/)
    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Workspace agent (Python FastAPI)
    location /workspace/ {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
